# ClusterSecretStore stub.
#
# This file is intentionally non-functional — it documents the providers ESO
# supports without enabling any of them. Pick one, uncomment its block, supply
# a credentials Secret in the external-secrets namespace, then `kubectl apply`.
#
# Naming convention: ExternalSecret resources elsewhere in the repo reference
# `clusterSecretStoreRef.name: bitcoin-mcast-secret-store`.

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: bitcoin-mcast-secret-store
spec:
  provider: {}
