# Cluster-level shared values consumed by platform Helmfile templates.
# Override per-environment by passing -e <name> to Helmfile.

clusterCIDR: "10.244.0.0/16"
clusterCIDRv6: "fd20:0:0:1::/64"
serviceCIDR: "10.96.0.0/12"
serviceCIDRv6: "fd30:0:0:1::/108"

# Default fabric NIC name on every k0s node (override per-host via NADs).
fabricIface: "enp5s0"

# Apiserver endpoint Cilium uses to bootstrap with kubeProxyReplacement (avoids the
# 10.96.0.1 ClusterIP chicken-and-egg). On k0s with nodeLocalLoadBalancing the per-
# node envoy serves the apiserver at 127.0.0.1:7443. Leave host empty on clusters
# that keep kube-proxy (Cilium then uses the ClusterIP normally).
k8sServiceHost: "127.0.0.1"
k8sServicePort: "7443"

# IPv6 multicast subnet that sits on the fabric NIC (matches the fd20::/64
# convention used elsewhere in the bsv-multicast docs).
fabricSubnet: "fd20::/64"

# Cilium autoDirectNodeRoutes — install direct routes for remote pod CIDRs via node IPs.
# REQUIRED on L2-adjacent clusters (all nodes on one subnet, e.g. the biz-lax lab on
# 10.10.10.0/24) so HOST-origin traffic reaches remote pods — the konnectivity-agent
# (hostNetwork) dials ClusterIPs/pods for admission webhooks via the kernel routing table,
# which otherwise has no remote-pod route. Set false on dispersed/routed-fabric clusters
# (nodes not on one L2) and let the fabric route pod CIDRs. See cni/cilium/values.yaml.gotmpl.
autoDirectNodeRoutes: true

# BGP-related toggles (Calico/Cilium); off by default.
bgp:
  enabled: false
  asn: 64512

# Cilium transparent node-to-node encryption (W1 edge-worker join). Off by
# default. When enabled, pin `devices` to the WAN NIC(s) so the WireGuard
# underlay endpoint is the WAN address, not the admin-overlay node InternalIP
# (keeps the pod mesh out of the admin overlay — no double-encapsulation).
# See 1bsv-ops/docs/production/02-edge-worker-join.md.
# Pod MTU for the native-routing + WireGuard datapath (see cni/cilium/values.yaml.gotmpl).
# 1380 + ~60 WG = ~1440 on-wire. Lower it per-fabric for lower-MTU WAN paths.
podMTU: 1380

encryption:
  # ON: WireGuard with NATIVE routing (no VXLAN). Proven on biz-lax 2026-06-23 once
  # routingMode=native + MTU=1380 were set — cross-node pods, DNS, OIDC all healthy.
  # The earlier blackhole was VXLAN+WG double-encap with an unreduced pod MTU, NOT WG
  # itself. Keep routingMode native (default.yaml/gotmpl) whenever this is enabled.
  enabled: true
  # nodeEncryption (host/kubelet traffic) stays off: that path rides the admin
  # overlay, not Cilium. Cilium encrypts pods only. See 02-edge-worker-join.md.
  nodeEncryption: false
  # Pin the WireGuard underlay endpoint to the WAN NIC (biz-lax nodes use enp5s0) so
  # the encryption endpoint is the node address, not the admin overlay.
  devices: ["enp5s0"]
